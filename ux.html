<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Community Chat — UI/UX</title>
<style>
  :root {
    --bg: #f8f1e9; /* Soft cream background */
    --card: #ffffff; /* White for cards */
    --text: #2d2d2d; /* Dark text for readability */
    --muted: #6b7280; /* Muted gray for secondary text */
    --accent: #5b4b3a; /* Warm brown for buttons and highlights */
    --accent-2: #d4a373; /* Soft tan for secondary accents */
    --border: rgba(0,0,0,0.1);
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  * {
    box-sizing: border-box;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  body {
    margin: 0;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    font-size: 16px;
    line-height: 1.5;
  }
  .app {
    width: 100%;
    max-width: 1200px;
    height: 90vh;
    display: flex;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--shadow);
    background: var(--card);
  }
  /* Sidebar */
  .sidebar {
    width: 280px;
    background: #fefaf4;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: transform 0.3s ease;
  }
  .brand {
    padding: 1.5rem;
    background: var(--accent);
    color: #fff;
    font-weight: 600;
    font-size: 1.25rem;
    text-align: center;
    letter-spacing: 0.5px;
  }
  .communities {
    flex: 1;
    overflow-y: auto;
    padding: 0.5rem;
  }
  .community-item {
    padding: 0.75rem 1rem;
    border-radius: 8px;
    cursor: pointer;
    margin: 0.25rem 0.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background 0.2s ease;
  }
  .community-item:hover {
    background: #f0e6d8;
  }
  .community-item.active {
    background: var(--accent-2);
    color: #fff;
  }
  .community-item div:first-child {
    font-weight: 600;
    font-size: 1rem;
  }
  .community-item div:last-child {
    font-size: 0.85rem;
    color: var(--muted);
  }
  .members {
    padding: 1rem;
    border-top: 1px solid var(--border);
  }
  .members h4 {
    margin: 0.5rem 0;
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 600;
  }
  .member-tag {
    display: inline-block;
    background: #fff;
    padding: 0.4rem 0.75rem;
    border-radius: 999px;
    margin: 0.25rem;
    font-size: 0.85rem;
    border: 1px solid var(--border);
    transition: background 0.2s ease;
  }
  .member-tag:hover {
    background: #f0e6d8;
  }
  /* Main Area */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .main-head {
    padding: 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
    background: #fff;
  }
  .main-head h2 {
    margin: 0;
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--text);
  }
  .domain-tag {
    background: var(--accent-2);
    padding: 0.5rem 1rem;
    border-radius: 999px;
    color: #fff;
    font-weight: 600;
    font-size: 0.9rem;
  }
  .composer {
    padding: 1rem;
    display: flex;
    gap: 1rem;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
    background: #fff;
  }
  .composer select,
  .composer input[type=text],
  .composer textarea {
    padding: 0.75rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    outline: none;
    font-size: 0.95rem;
    transition: border-color 0.2s ease;
  }
  .composer select:focus,
  .composer input[type=text]:focus,
  .composer textarea:focus {
    border-color: var(--accent);
  }
  .composer select {
    min-width: 150px;
  }
  .composer textarea {
    flex: 1;
    min-height: 80px;
    resize: vertical;
  }
  .composer .controls {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .icon-btn {
    background: var(--accent);
    color: #fff;
    padding: 0.75rem;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 0.95rem;
    transition: background 0.2s ease;
  }
  .icon-btn:hover {
    background: #4a3c2e;
  }
  .small-btn {
    background: #fff;
    border: 1px solid var(--border);
    padding: 0.5rem;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: background 0.2s ease;
  }
  .small-btn:hover {
    background: #f0e6d8;
  }
  .feed {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    background: var(--bg);
  }
  .post {
    background: var(--card);
    border-radius: 12px;
    padding: 1rem;
    border: 1px solid var(--border);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .post:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }
  .post-head {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
  }
  .post-author {
    font-weight: 600;
    font-size: 1rem;
    color: var(--text);
  }
  .post-time {
    font-size: 0.85rem;
    color: var(--muted);
  }
  .post-content {
    margin: 0.5rem 0;
    white-space: pre-wrap;
    font-size: 0.95rem;
    line-height: 1.6;
    color: var(--text);
  }
  .post-media img {
    max-width: 100%;
    max-height: 300px;
    object-fit: cover;
    border-radius: 8px;
    margin-top: 0.5rem;
  }
  .post-media a {
    display: inline-block;
    margin-top: 0.5rem;
    color: var(--accent);
    text-decoration: none;
    border: 1px solid var(--border);
    padding: 0.5rem 1rem;
    border-radius: 8px;
    font-size: 0.9rem;
  }
  .post-media a:hover {
    background: #f0e6d8;
  }
  .post-actions {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    margin-top: 0.75rem;
  }
  .like-btn, .comment-toggle {
    background: #fff;
    border: 1px solid var(--border);
    padding: 0.5rem 0.75rem;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: background 0.2s ease;
  }
  .like-btn:hover, .comment-toggle:hover {
    background: #f0e6d8;
  }
  .like-count {
    font-weight: 600;
    color: var(--accent);
  }
  .comments {
    margin-top: 0.75rem;
    border-top: 1px solid var(--border);
    padding-top: 0.75rem;
  }
  .comment {
    padding: 0.5rem;
    border-radius: 8px;
    background: #fafaf9;
    margin-bottom: 0.5rem;
  }
  .comment .meta {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 0.25rem;
  }
  .comment-input {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.5rem;
  }
  .comment-input input {
    flex: 1;
    padding: 0.5rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-size: 0.9rem;
  }
  .comment-input input:focus {
    border-color: var(--accent);
  }
  /* Mobile Menu Toggle */
  .menu-toggle {
    display: none;
    padding: 0.75rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
  }
  /* Responsive */
  @media (max-width: 880px) {
    .app {
      max-width: 100%;
      flex-direction: column;
    }
    .sidebar {
      width: 100%;
      height: auto;
      transform: translateY(-100%);
      position: absolute;
      top: 0;
      left: 0;
      z-index: 10;
    }
    .sidebar.active {
      transform: translateY(0);
    }
    .main-head {
      position: relative;
      padding-top: 3.5rem;
    }
    .menu-toggle {
      display: block;
      position: absolute;
      top: 1rem;
      left: 1rem;
    }
    .main {
      height: 100%;
    }
  }
</style>
</head>
<body>
  <div class="app" role="application" aria-label="Community chat app">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar" aria-hidden="false">
      <div class="brand">Community Hub</div>
      <div class="communities" id="communityList" role="list"></div>
      <div class="members">
        <h4>Members</h4>
        <div id="memberTags"></div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <div class="main-head">
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle sidebar">☰</button>
        <div class="domain-tag" id="domainTag">UI/UX</div>
        <h2 id="communityTitle">UI/UX</h2>
        <div style="flex:1"></div>
        <div style="font-size:0.85rem;color:var(--muted)">Public community — posts visible to all</div>
      </div>

      <!-- composer -->
      <div class="composer" aria-label="Post composer">
        <select id="authorSelect" title="Post as">
          <!-- filled by JS -->
        </select>
        <textarea id="postText" placeholder="Share something about UI/UX — text, code snippet, links..."></textarea>
        <div class="controls">
          <label class="small-btn" title="Attach file">
            <input id="postFile" type="file" style="display:none"/>
            📎 Attach
          </label>
          <button class="icon-btn" id="postBtn">Post</button>
        </div>
      </div>

      <!-- feed -->
      <div class="feed" id="feed" aria-live="polite">
        <!-- posts inserted here -->
      </div>
    </main>
  </div>

<script>
/* ---------------------------
  Simple Community Chat App
  - communities[] contains community objects
  - posts stored per community in localStorage under key "comm_posts"
---------------------------- */

const MEMBERS = [
  "Aarav", "Priya", "Rahul", "Sneha", "Arjun", "Meera", "Vikram", "Nisha", "Karan", "Isha"
];

const DEFAULT_COMMUNITIES = [
  { id: " UI/UX", domain: "UI.UX", description: "" }
 
];

const STORAGE_KEY = "community_posts_v1";

/* load or init posts object { communityId: [posts...] } */
function loadStored() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return {};
    return JSON.parse(raw);
  } catch (e) {
    console.warn("storage parse fail", e);
    return {};
  }
}
function saveStored(obj){ localStorage.setItem(STORAGE_KEY, JSON.stringify(obj)); }

/* create initial communities + stored posts */
let stored = loadStored();
DEFAULT_COMMUNITIES.forEach(c=>{
  if (!stored[c.id]) {
    stored[c.id] = c.id === "DataScience" ? [
      {
        id: genId(),
        author: "Aarav",
        text: "Welcome to UI/UX community! Share papers, notebooks and questions here. 🔬",
        media: null,
        fileName: null,
        likes: 3,
        comments: [{id: genId(), author:"Priya", text:"Great initiative!", time: ts()}],
        time: ts()
      }
    ] : [];
  }
});
saveStored(stored);

/* utilities */
function ts(){ return new Date().toISOString(); }
function fmtTime(iso){ const d=new Date(iso); return d.toLocaleString(); }
function genId(){ return Math.random().toString(36).slice(2,10); }

/* DOM refs */
const communityListEl = document.getElementById("communityList");
const memberTagsEl = document.getElementById("memberTags");
const authorSelect = document.getElementById("authorSelect");
const postText = document.getElementById("postText");
const postFile = document.getElementById("postFile");
const postBtn = document.getElementById("postBtn");
const feedEl = document.getElementById("feed");
const communityTitle = document.getElementById("communityTitle");
const domainTag = document.getElementById("domainTag");
const sidebar = document.getElementById("sidebar");
const menuToggle = document.getElementById("menuToggle");

/* current community */
let currentCommunity = DEFAULT_COMMUNITIES[0].id;

/* render members */
function renderMembers() {
  memberTagsEl.innerHTML = "";
  MEMBERS.forEach(m=>{
    const el = document.createElement("span");
    el.className = "member-tag";
    el.textContent = m;
    memberTagsEl.appendChild(el);
  });
  authorSelect.innerHTML = "";
  MEMBERS.forEach(m=>{
    const opt = document.createElement("option");
    opt.value = m; opt.textContent = m;
    authorSelect.appendChild(opt);
  });
}

/* render community list */
function renderCommunities(){
  communityListEl.innerHTML = "";
  DEFAULT_COMMUNITIES.forEach(c=>{
    const div = document.createElement("div");
    div.className = "community-item" + (c.id===currentCommunity ? " active" : "");
    div.setAttribute("role","button");
    div.innerHTML = `<div style="font-weight:600">${c.id}</div><div style="font-size:0.85rem;color:var(--muted)">${c.description}</div>`;
    div.onclick = ()=>{
      currentCommunity = c.id;
      domainTag.textContent = "#"+c.id;
      communityTitle.textContent = c.id;
      renderCommunities();
      renderFeed();
      if (window.innerWidth <= 880) {
        sidebar.classList.remove("active");
      }
    };
    communityListEl.appendChild(div);
  });
}

/* render feed for current community */
function renderFeed(){
  feedEl.innerHTML = "";
  const posts = (stored[currentCommunity]||[]).slice().reverse();
  if (!posts.length){
    const empty = document.createElement("div");
    empty.style.color = "var(--muted)";
    empty.style.padding = "1.5rem";
    empty.style.textAlign = "center";
    empty.textContent = "No posts yet — be the first to post in this community!";
    feedEl.appendChild(empty);
    return;
  }
  posts.forEach(post=>{
    const postEl = document.createElement("article");
    postEl.className = "post";
    postEl.dataset.postId = post.id;
    postEl.innerHTML = `
      <div class="post-head">
        <div class="post-author">${escapeHtml(post.author)}</div>
        <div class="post-time">${fmtTime(post.time)}</div>
      </div>
      <div class="post-content">${post.isHTML ? post.text : escapeHtml(post.text)}</div>
      <div class="post-media"></div>
      <div class="post-actions">
        <button class="like-btn">❤ <span class="like-count">${post.likes||0}</span></button>
        <button class="comment-toggle">💬 ${post.comments ? post.comments.length : 0}</button>
      </div>
      <div class="comments" style="display:${post.comments && post.comments.length ? 'block':'none'}"></div>
    `;
    const mediaEl = postEl.querySelector(".post-media");
    if (post.media){
      if (post.mediaType && post.mediaType.startsWith("image/")){
        const img = document.createElement("img");
        img.src = post.media;
        img.alt = "posted image";
        mediaEl.appendChild(img);
      } else {
        const a = document.createElement("a");
        a.href = post.media;
        a.download = post.fileName || "file";
        a.textContent = post.fileName || "Download file";
        mediaEl.appendChild(a);
      }
    }
    const commentsEl = postEl.querySelector(".comments");
    if (post.comments && post.comments.length){
      post.comments.forEach(c=>{
        const cEl = createCommentEl(c);
        commentsEl.appendChild(cEl);
      });
    }
    const commentInputWrap = document.createElement("div");
    commentInputWrap.className = "comment-input";
    commentInputWrap.innerHTML = `
      <input placeholder="Add a comment..." aria-label="Add comment"/>
      <button class="small-btn">Reply</button>
    `;
    commentsEl.appendChild(commentInputWrap);

    postEl.querySelector(".like-btn").addEventListener("click", ()=>{
      toggleLike(post.id);
    });
    postEl.querySelector(".comment-toggle").addEventListener("click", ()=>{
      commentsEl.style.display = commentsEl.style.display === "none" ? "block" : "none";
    });
    commentInputWrap.querySelector("button").addEventListener("click", ()=>{
      const txt = commentInputWrap.querySelector("input").value.trim();
      if (!txt) return;
      addComment(post.id, authorSelect.value, txt);
      commentInputWrap.querySelector("input").value = "";
    });

    feedEl.appendChild(postEl);
  });
}

/* escape to prevent HTML injection unless post.isHTML true */
function escapeHtml(str){
  if (!str) return "";
  return String(str).replace(/[&<>"']/g, s=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[s]));
}

/* create comment DOM */
function createCommentEl(c){
  const d = document.createElement("div");
  d.className = "comment";
  d.innerHTML = `<div class="meta"><strong>${escapeHtml(c.author)}</strong> • ${fmtTime(c.time)}</div><div>${escapeHtml(c.text)}</div>`;
  return d;
}

/* posting flow */
postBtn.addEventListener("click", ()=>submitPost());
postFile.addEventListener("change", ()=> {});

function submitPost(){
  const text = postText.value.trim();
  const file = postFile.files && postFile.files[0];
  if (!text && !file) return alert("Write something or attach a file.");
  const author = authorSelect.value || MEMBERS[0];
  const newPost = {
    id: genId(),
    author,
    text: text,
    isHTML: false,
    media: null,
    mediaType: null,
    fileName: null,
    likes: 0,
    comments: [],
    time: ts()
  };

  if (file){
    const reader = new FileReader();
    reader.onload = function(e){
      newPost.media = e.target.result;
      newPost.mediaType = file.type;
      newPost.fileName = file.name;
      pushPost(newPost);
    };
    reader.readAsDataURL(file);
  } else {
    pushPost(newPost);
  }
  postText.value = ""; postFile.value = "";
}

function pushPost(post){
  stored[currentCommunity] = stored[currentCommunity] || [];
  stored[currentCommunity].push(post);
  saveStored(stored);
  renderFeed();
}

/* interactions: like & comment */
function toggleLike(postId){
  const posts = stored[currentCommunity] || [];
  const p = posts.find(x=>x.id===postId);
  if (!p) return;
  p.likes = (p.likes||0) + 1;
  saveStored(stored);
  renderFeed();
}

function addComment(postId, author, text){
  const posts = stored[currentCommunity] || [];
  const p = posts.find(x=>x.id===postId);
  if (!p) return;
  p.comments = p.comments || [];
  p.comments.push({ id: genId(), author: author||MEMBERS[0], text, time: ts() });
  saveStored(stored);
  renderFeed();
}

/* mobile menu toggle */
menuToggle.addEventListener("click", () => {
  sidebar.classList.toggle("active");
});

/* init */
renderMembers();
renderCommunities();
renderFeed();

/* expose small helper to clear storage (dev) */
window._clearCommunityData = function(){ if(confirm("Clear all stored posts?")){ localStorage.removeItem(STORAGE_KEY); location.reload(); } }
</script>
</body>
</html>
